name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install test dependencies
        run: python -m pip install --upgrade PyYAML
      - name: Run regression suite
        run: bash scripts/test.sh
      - name: Run workflow guard
        run: python scripts/test-user-stories.py
      - name: Run reference taxonomy probe
        run: python scripts/probe-reference-taxonomy.py
